<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />"
</head>

<body>
    <!-- Header Started -->
    <div class="header">
        <div class="header-left">
            <i class="material-symbols-outlined">menu</i>
            <img
                src="https://www.freeiconspng.com/thumbs/youtube-logo-png/youtube-logo-png-transparent-image-5.png">
        </div>

        <div class="header-search">
            <form action="">
                <input type="text" placeholder="search">
                <button>
                    <i class="material-symbols-outlined">search</i>
                </button>
            </form>
            <div class="search-mic">
                <i class="material-symbols-outlined">mic</i>
            </div>
        </div>
        <div class="header-icons">
            <i class="material-symbols-outlined">video_call</i>
            <i class="material-symbols-outlined">notifications</i>
            <i class="material-symbols-outlined">account_circle</i>
        </div>

    </div>
    <!-- Header Ended -->
</body>

</html>
